<body>
    <h1 class="title">Task Manager</h1>
    <div class="header">
        <label for="search">Search:</label>
        <input type="text" id="searchLabel" >

            <option value="name">Name</option>
            <option value="email">Status</option>
            <option value="email">Date</option>
            <option value="email">Est. Time</option>
        </select>

        <select id="orderBy">
            <option value="ascending">Ascending</option>
            <option value="descending">Descending</option>
            </select>

        <button id="newTask">New Task</button>

        <button id="category">Edit Categories</button>
    </div>

    <div id="tasks-container">
       
    </div>

<div id="modalCategory" class="modal">

  </div>

</div>
